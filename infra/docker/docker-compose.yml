networks:
  openbika_edge:
    name: openbika_edge

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: openbika_control
      POSTGRES_PASSWORD: openbika
      POSTGRES_USER: openbika
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbika -d openbika_control"]
      interval: 5s
      retries: 20
      timeout: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  temporal:
    image: temporalio/auto-setup:1.29.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_PWD: openbika
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: openbika
    ports:
      - "7233:7233"

  traefik:
    image: traefik:v3.6.7
    profiles: ["edge"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/openbika/traefik/dynamic
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - openbika_edge
    environment:
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${OPENBIKA_TRAEFIK_ACME_EMAIL:-admin@example.com}
    command:
      - --configfile=/etc/traefik/traefik.yml

  temporal-ui:
    image: temporalio/ui:2.43.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:8787
    ports:
      - "8080:8080"

volumes:
  postgres-data:
